<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>彩票历史分析</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <header class="topbar">
    <div class="brand">
      <div class="brand-title" data-i18n="title">彩票历史分析</div>
      <div class="brand-sub" data-i18n="subtitle">数据舱 · 趋势 · 结构</div>
    </div>
    <div class="top-actions">
      <div class="lang-toggle" role="group" aria-label="language switch">
        <button class="chip is-active" data-lang="zh">中文</button>
        <button class="chip" data-lang="en">EN</button>
      </div>
    </div>
  </header>

  <nav class="menu">
    <button id="historyDataBtn" class="menuBtn" data-view="history" data-i18n="view.history">历史数据</button>
    <button id="ballBlockBtn" class="menuBtn" data-view="block" data-i18n="view.block">七球区间</button>
    <button id="distributionBtn" class="menuBtn" data-view="distribution" data-i18n="view.distribution">分布热力</button>
    <button id="hotBtn" class="menuBtn" data-view="hot" data-i18n="view.hot">热号</button>
    <button id="missingBtn" class="menuBtn" data-view="missing" data-i18n="view.missing">遗漏</button>
    <button id="trendBtn" class="menuBtn" data-view="trend" data-i18n="view.trend">趋势</button>
    <button id="chartsBtn" class="menuBtn" data-view="charts" data-i18n="view.charts">图表</button>
    <button id="continousNumberBtn" class="menuBtn" data-view="continuous" data-i18n="view.continuous">连续号码</button>
    <button id="statisticsBtn" class="menuBtn" data-view="statistics" data-i18n="view.statistics">统计数据</button>
    <button id="pbPreviousBtn" class="menuBtn" data-view="pb" data-i18n="view.pb">PB对比</button>
    <button id="contactBtn" class="menuBtn" data-view="contact" data-i18n="view.contact">联系</button>
  </nav>

  <section class="dashboard">
    <div class="panel overview">
      <div class="panel-title" data-i18n="overview.title">概览</div>
      <div id="overview" class="overview-grid"></div>
      <div id="overviewExtra" class="overview-extra"></div>
    </div>

    <div class="panel main">
      <div class="panel-title" id="viewTitle"></div>
      <div class="wrapper" id="wrapper"></div>
    </div>
  </section>

  <script type="module" src="./app.js"></script>
</body>

</html>
